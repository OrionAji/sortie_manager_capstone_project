$kind: http-request
name: List Pilots
method: GET
url: '{{baseUrl}}/api/v1/pilots/'
order: 7000
headers:
  - key: Authorization
    value: 'Token {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response is JSON', function () {
        pm.response.to.be.json;
      });

      const json = pm.response.json();
      pm.test('Response is an array', function () {
        pm.expect(json).to.be.an('array');
      });

      if (json.length > 0) {
        pm.test('Each pilot has required fields', function () {
          json.forEach(function(pilot) {
            pm.expect(pilot).to.have.property('id');
            pm.expect(pilot).to.have.property('callsign');
            pm.expect(pilot).to.have.property('rank');
            pm.expect(pilot).to.have.property('total_hours');
          });
        });
      }