$kind: http-request
name: Delete Pilot by ID
method: DELETE
url: '{{baseUrl}}/api/v1/pilots/:id/'
order: 11000
pathVariables:
  - key: id
    value: '{{pilotId}}'
headers:
  - key: Authorization
    value: 'Token {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 204', function () {
        pm.response.to.have.status(204);
      });

      // Clear the pilotId variable after deletion
      pm.collectionVariables.unset('pilotId');