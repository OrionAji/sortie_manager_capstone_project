$kind: http-request
name: Delete Sortie by ID
method: DELETE
url: '{{baseUrl}}/api/v1/sorties/:id/'
order: 16000
pathVariables:
  - key: id
    value: '{{sortieId}}'
headers:
  - key: Authorization
    value: 'Token {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 204', function () {
        pm.response.to.have.status(204);
      });
