$kind: http-request
name: Get Sortie by ID
method: GET
url: '{{baseUrl}}/api/v1/sorties/:id/'
order: 14000
pathVariables:
  - key: id
    value: '{{sortieId}}'
headers:
  - key: Authorization
    value: 'Token {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response is JSON', function () {
        pm.response.to.be.json;
      });
