$kind: http-request
name: Update Sortie by ID
method: PUT
url: '{{baseUrl}}/api/v1/sorties/:id/'
order: 15000
pathVariables:
  - key: id
    value: '{{sortieId}}'
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Token {{authToken}}'
body:
  type: json
  content: |-
    {
      "aircraft": "{{aircraftId}}",
      "pilot": "{{pilotId}}",
      "mission_date": "2026-03-07",
      "mission_type": "TRAINING",
      "status": "COMPLETED"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response is JSON', function () {
        pm.response.to.be.json;
      });
