$kind: http-request
name: Get Aircraft by ID
method: GET
url: '{{baseUrl}}/api/v1/aircraft/:id/'
order: 4000
pathVariables:
  - key: id
    value: '{{aircraftId}}'
headers:
  - key: Authorization
    value: 'Token {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response is JSON', function () {
        pm.response.to.be.json;
      });

      const json = pm.response.json();
      pm.test('id matches requested', function () {
        pm.expect(String(json.id)).to.eql(pm.collectionVariables.get('aircraftId'));
      });

      pm.test('Response has required fields', function () {
        pm.expect(json).to.have.property('tail_number');
        pm.expect(json).to.have.property('status');
        pm.expect(json).to.have.property('airframe_hours');
      });