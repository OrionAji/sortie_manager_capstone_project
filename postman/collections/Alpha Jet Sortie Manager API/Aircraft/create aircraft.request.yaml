$kind: http-request
name: Create Aircraft
method: POST
url: '{{baseUrl}}/api/v1/aircraft/'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Token {{authToken}}'
body:
  type: json
  content: |-
    {
      "tail_number": "AJ-001",
      "status": "MC",
      "airframe_hours": "150.50"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 201', function () {
        pm.response.to.have.status(201);
      });

      pm.test('Response is JSON', function () {
        pm.response.to.be.json;
      });

      const json = pm.response.json();
      pm.test('id is present', function () {
        pm.expect(json).to.have.property('id');
      });

      pm.test('tail_number matches', function () {
        pm.expect(json.tail_number).to.eql('AJ-001');
      });

      pm.test('status is valid choice (MC, GND, or MAINT)', function () {
        pm.expect(['MC', 'GND', 'MAINT']).to.include(json.status);
      });

      pm.test('airframe_hours is present', function () {
        pm.expect(json).to.have.property('airframe_hours');
      });

      // Save for subsequent requests
      if (json && json.id) {
        pm.collectionVariables.set('aircraftId', String(json.id));
      }