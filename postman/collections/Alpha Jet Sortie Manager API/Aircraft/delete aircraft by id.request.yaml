$kind: http-request
name: Delete Aircraft by ID
method: DELETE
url: '{{baseUrl}}/api/v1/aircraft/:id/'
order: 6000
pathVariables:
  - key: id
    value: '{{aircraftId}}'
headers:
  - key: Authorization
    value: 'Token {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 204', function () {
        pm.response.to.have.status(204);
      });
